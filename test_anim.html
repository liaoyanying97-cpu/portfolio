<!DOCTYPE html>
<html><head><style>
.falling-petal { animation: petal-fall 4s linear infinite; position: absolute; width: 100px; height: 100px; background: red; top: 50%; left: 50%; }
@keyframes petal-fall {
    0% { opacity: 0; transform: translate(0, -10%) rotate(-10deg); }
    15% { opacity: 1; transform: translate(-40%, 30%) rotate(10deg); }
    37.5% { opacity: 1; transform: translate(-100%, 90%) rotate(-5deg); }
    67.5% { opacity: 0; transform: translate(-180%, 170%) rotate(15deg); }
    100% { opacity: 0; transform: translate(-266%, 256%) rotate(0deg); }
}
</style></head><body>
<div class="falling-petal"></div>
</body></html>
